monitor=,preferred,auto,auto
source = ~/.config/hypr/kinetic-scroll.conf

# Set programs that you use
$terminal = ghostty
$terminalSession = ghostty -e tmux new-session
$browser = firefox
$fileManager = ghostty -e yazi
$menu = vicinae

# exec-once = nm-applet &
exec-once = [workspace 1 silent] $browser
exec-once = [workspace 2 silent] $terminal -e tmux new-session -A -s opencode opencode -c
exec-once = [workspace 3 silent] Telegram
exec-once = [workspace special:magic silent] $terminalSession
exec = hyprctl setcursor rose-pine-hyprcursor 24


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,BreezeX-RosePine-Linux
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = LC_TIME,en_GB.UTF-8

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 2

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(7e9cd8ee) rgba(957fb8ee) 45deg
    col.inactive_border = rgba(54546daa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 5

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.96

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(16161ddd)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, slide
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = specialWorkspace,    1, 2, almostLinear, slidevert
    animation = specialWorkspaceIn,  1, 2, almostLinear, slidevert
    animation = specialWorkspaceOut, 1, 2, almostLinear, slidevert
    animation = zoomFactor,    1,     7,     quick
}
# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    # pseudotile was removed in Hyprland 0.55; use the pseudo dispatcher/keybind instead.
    preserve_split = true # You probably want this
    force_split = 2
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps,altwin:swap_alt_win
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

binds {
    hide_special_on_workspace_change = true
}

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminalSession
bind = $mainMod, code:24, killactive,
bind = $mainMod CTRL, code:24, exec, pidof hyprlock >/dev/null 2>&1 || hyprlock
bind = $mainMod ctrl, code:32, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, code:26, exec, $fileManager
bindd = $mainMod, code:54, Universal copy, sendshortcut, CTRL,Insert,activewindow
bindd = $mainMod, code:55, Universal paste, sendshortcut, SHIFT,Insert,activewindow
bindd = $mainMod, code:53, Universal cut, sendshortcut, CTRL,code:53,activewindow
bindd = $mainMod, code:52, Universal undo, sendshortcut, CTRL,code:52,activewindow
bindd = $mainMod, code:38, Universal select all, sendshortcut, CTRL,code:38,activewindow
bindd = $mainMod, BACKSPACE, Delete to line start, sendshortcut, CTRL,code:30,activewindow
bindd = $mainMod SHIFT, code:55, Clipboard manager, exec, $menu deeplink vicinae://launch/clipboard/history
bind = $mainMod, code:56, exec, $browser
bind = $mainMod SHIFT, code:56, exec, $browser --private-window
bind = $mainMod, code:57, exec, $menu vicinae://launch/browser-extension/browse-tabs
bind = $mainMod, code:33, exec, screenshot-region
bind = $mainMod ctrl, code:46, exec, pidof hyprlock >/dev/null 2>&1 || hyprlock
bind = $mainMod, space, exec, $menu open
bind = CTRL, code:65, exec, hyprctl switchxkblayout keyd-virtual-keyboard next
bind = $mainMod, code:31, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, code:43, movefocus, l
bind = $mainMod, code:46, movefocus, r
bind = $mainMod, code:45, movefocus, u
bind = $mainMod, code:44, movefocus, d
bind = $mainMod SHIFT, code:43, movewindow, l
bind = $mainMod SHIFT, code:46, movewindow, r
bind = $mainMod SHIFT, code:45, movewindow, u
bind = $mainMod SHIFT, code:44, movewindow, d
bindd = $mainMod, code:20, Expand window left, resizeactive, -50 0
bindd = $mainMod, code:21, Shrink window left, resizeactive, 50 0
bindd = $mainMod SHIFT, code:20, Shrink window up, resizeactive, 0 -50
bindd = $mainMod SHIFT, code:21, Expand window down, resizeactive, 0 50

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, code:39, togglespecialworkspace, magic
bind = $mainMod SHIFT, code:39, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindl = , XF86PowerOff, exec, pidof hyprlock >/dev/null 2>&1 || hyprlock
bindl = , switch:on:Lid Switch, exec, pidof hyprlock >/dev/null 2>&1 || hyprlock
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, osd-volume up
bindel = ,XF86AudioLowerVolume, exec, osd-volume down
bindel = ,XF86AudioMute, exec, osd-volume mute
bindel = ,XF86AudioMicMute, exec, osd-volume mic-mute
bindel = ,XF86MonBrightnessUp, exec, osd-brightness up
bindel = ,XF86MonBrightnessDown, exec, osd-brightness down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Remove decorations and gaps when a tiled window is alone on its workspace.
workspace = w[tv1], gapsout:0, gapsin:0

windowrule {
    name = smart-single-window
    match:float = false
    match:workspace = w[tv1]

    border_size = 0
    rounding = 0
}

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = ghostty-opacity
    match:class = ^(com\.mitchellh\.ghostty|ghostty)$

    opacity = 1.00 0.96
}

windowrule {
    name = wifi-manager-float
    match:class = ^(wifi-manager)$

    float = yes
    center = yes
    size = 1040 720
}

windowrule {
    name = bluetooth-manager-float
    match:class = ^(bluetooth-manager)$

    float = yes
    center = yes
    size = 1040 720
}

windowrule {
    name = audio-manager-float
    match:class = ^(audio-manager)$

    float = yes
    center = yes
    size = 1040 720
}
